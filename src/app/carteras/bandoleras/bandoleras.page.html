<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/carteras"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ carteras?.title }}</ion-title>
    <ion-buttons slot="end">
      <button ion-button icon-only (click)="eliminarCartera()">
        <ion-icon name="trash"></ion-icon>
      </button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ carteras?.title }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid fixed style="padding: 0;">
    
    <ion-row>
      <ion-col size="12">
        <div style="text-align: center; padding: 16px; ">
          <ion-img 
            [src]="carteras?.imageURL" 
            style="max-height: 40vh; width: 100%; object-fit: contain; border-radius: 12px; display: block; margin: 0 auto;">
          </ion-img>
        </div>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="12" style="padding: 10px 16px;">
        <ion-list lines="none" style="padding: 0; background: transparent;">
          <ion-item *ngFor="let comentario of carteras?.comments" style="--background: #f4f5f8; margin-bottom: 8px; border-radius: 8px;">
            <ion-label>
              <p style="color: #333; margin: 0; font-size: 1em;">{{ comentario }}</p>
            </ion-label>
          </ion-item>
        </ion-list>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="12" style="padding: 16px;">
        <h3 style="margin: 0 0 16px 4px; font-weight: bold; color: #333;">Añadir Nuevo Modelo</h3>
        
        <form [formGroup]="carteraForm" (ngSubmit)="guardarCartera()">
          
          <ion-item style="margin-bottom: 12px;">
            <ion-input label="Nombre de la Cartera" labelPlacement="stacked" formControlName="title" type="text" placeholder="Ej. Bandolera Camuflada"></ion-input>
          </ion-item>  

          <ion-item style="margin-bottom: 16px;">
            <ion-textarea label="Comentario Inicial" labelPlacement="stacked" formControlName="comment" placeholder="Describe el modelo"></ion-textarea>
          </ion-item>

          <ion-button type="submit" [disabled]="!carteraForm.valid" expand="block" shape="round">
            Agregar Cartera
          </ion-button>

        </form>
      </ion-col>
    </ion-row>

  </ion-grid>
</ion-content>
