<ion-app>
  <ion-menu contentId="main-content" type="overlay">
    
    <ion-header>
      <ion-toolbar color="light">
        <ion-title>Jadri Bag</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/home" lines="none" detail="false">
            <ion-icon slot="start" name="home-outline"></ion-icon>
            <ion-label>Inicio</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/perfil" lines="none" detail="false">
            <ion-icon slot="start" name="person-outline"></ion-icon>
            <ion-label>Información Personal</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/contacto" lines="none" detail="false">
            <ion-icon slot="start" name="mail-outline"></ion-icon>
            <ion-label>Contacto</ion-label>
          </ion-item>
        </ion-menu-toggle>

      </ion-list>
    </ion-content>
  </ion-menu>

  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>
</ion-app>
